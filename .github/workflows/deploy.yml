name: Deploy to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::168992393550:role/github-action-deploy-francesco-agnoletto.com
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://francesco-agnoletto-frontend.com-168992393550-us-east-1-an \
            --delete

      - name: Invalidate CloudFront cache for index.html
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E183VIHR915PJ2 \
            --paths "/" "/index.html"
