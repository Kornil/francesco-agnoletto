name: Deploy to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Capture start time
        id: start_time
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Build project
        run: npm run build

      - name: Generate deployment report
        run: |
          START_TIME=${{ steps.start_time.outputs.start_time }}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          cat > dist/data/deploy-stats.json <<EOF
          {
            "runNumber": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "durationSeconds": $DURATION
          }
          EOF

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTION_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          # Long cache for fingerprinted assets
          aws s3 sync dist/assets/ ${{ vars.S3_BUCKET_URI }}/assets/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

          # No cache for everything else
          aws s3 sync dist/ ${{ vars.S3_BUCKET_URI }} \
            --delete \
            --exclude "assets/*" \
            --exclude "data/*"

          aws s3 cp dist/data/deploy-stats.json ${{ vars.S3_BUCKET_URI }}/data/deploy-stats.json

      - name: Invalidate CloudFront cache for index.html
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/" "/index.html" "/data/deploy-stats.json"
