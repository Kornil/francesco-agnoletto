name: Deploy to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Capture start time
        id: start_time
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Build project
        run: npm run build

      - name: Generate deployment report
        run: |
          START_TIME=${{ steps.start_time.outputs.start_time }}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          cat > dist/stats.json <<EOF
          {
            "runNumber": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "durationSeconds": $DURATION
          }
          EOF

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::168992393550:role/github-action-deploy-francesco-agnoletto.com
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://francesco-agnoletto-frontend.com-168992393550-us-east-1-an \
            --delete

      - name: Invalidate CloudFront cache for index.html
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E183VIHR915PJ2 \
            --paths "/" "/index.html" "/stats.json"
